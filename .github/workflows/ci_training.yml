name: CI Pipeline & Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "Workflow-CI/**"
      - ".github/workflows/ci_training.yml"

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: restuzaki
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/restuzaki/Eksperimen_SML_Damai.mlflow

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLflow Project (Training Model)
        run: |
          echo "Menjalankan pelatihan model otomatis..."
          mlflow run Workflow-CI/MLProject/ --env-manager=local --experiment-name="Phishing_Detection_CI_Pipeline"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cat << 'EOF' > build_script.py
          import mlflow
          import os
          from mlflow.tracking import MlflowClient


          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI")
          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient()


          print("Mencari Run ID yang sukses...")
          df = mlflow.search_runs(experiment_names=['Phishing_Detection_CI_Pipeline'], filter_string="status = 'FINISHED'")
          run_id = df.sort_values('start_time', ascending=False).iloc[0].run_id
          print(f"Menggunakan Run ID: {run_id}")


          print("\n Cek artefak di DagsHub...")
          artifacts = client.list_artifacts(run_id)

          if not artifacts:
              raise Exception("Tidak ada artefak sama sekali. Berarti saat step 'Training Model' tadi, file model gagal dikirim ke DagsHub.")

          print("Daftar file/folder yang berhasil ditemukan di DagsHub:")
          for a in artifacts:
              print(f" - {a.path}")

          if not any(a.path == "model" for a in artifacts):
              raise Exception("Folder 'model' tidak ada di daftar!")


          print("\n Folder 'model' ditemukan! Mulai mendownload...")
          mlflow.artifacts.download_artifacts(artifact_uri=f"runs:/{run_id}/model", dst_path='./local_model_dir')
          print("Download selesai!")
          EOF

          python build_script.py

          echo "Membangun Docker Image..."
          mlflow models build-docker -m "./local_model_dir/model" -n ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest

          echo "Mengirim (Push) Image ke Docker Hub..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest
