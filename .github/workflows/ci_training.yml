name: CI Pipeline & Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "Workflow-CI/**"
      - ".github/workflows/ci_training.yml"

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: restuzaki
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/restuzaki/Eksperimen_SML_Damai.mlflow

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLflow Project (Training Model)
        run: |
          echo "Menjalankan pelatihan model otomatis..."
          mlflow run Workflow-CI/MLProject/ --env-manager=local --experiment-name="Phishing_Detection_CI_Pipeline"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cat << 'EOF' > build_script.py
          import mlflow
          import os
          import time
          from mlflow.tracking import MlflowClient

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI")
          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient(tracking_uri)

          print(" Menunggu 20 detik agar DagsHub selesai merapikan file...")
          time.sleep(20)


          df = mlflow.search_runs(search_all_experiments=True, filter_string="status = 'FINISHED'")
          df_sorted = df.sort_values('start_time', ascending=False)

          print(f" Ditemukan {len(df_sorted)} Run yang sudah Selesai. Memeriksa 3 Run terbaru...")

          target_run_id = None
          for attempt in range(5):
              for i, row in df_sorted.head(3).iterrows():
                  run_id = row.run_id
                  print(f"\n Memeriksa Run ID: {run_id}")
                  try:
                      artifacts = client.list_artifacts(run_id)
                      paths = [a.path for a in artifacts]
                      print(f" Isi brankas: {paths}")
                      
                      # Jika brankas TIDAK KOSONG, langsung ambil! (Tidak peduli apa namanya)
                      if len(paths) > 0:
                          target_run_id = run_id
                          break
                  except Exception as e:
                      print(f" Gagal mengecek artefak: {e}")
              
              if target_run_id:
                  break
              
              print("\n Semua brankas terbaru masih kosong. DagsHub mungkin sedang delay. Tunggu 15 detik lagi...")
              time.sleep(15)

          if not target_run_id:
              raise Exception(" Gagal! Brankas masih kosong setelah ditunggu berkali-kali.")

          print(f"\n Artefak ditemukan di Run ID {target_run_id}!")
          print("Mendownload SEMUA isi brankas ke folder lokal...")
          mlflow.artifacts.download_artifacts(artifact_uri=f"runs:/{target_run_id}", dst_path='./local_model_dir')
          print("Download artefak berhasil!")
          EOF

          python build_script.py

          echo "Mencari lokasi pasti dari file MLmodel..."
          # Mencari folder tempat MLmodel berada secara otomatis tanpa peduli struktur folder
          MODEL_DIR=$(dirname $(find ./local_model_dir -name "MLmodel" | head -n 1))
          echo "Model ditemukan di direktori: $MODEL_DIR"

          echo "Membangun Docker Image..."
          mlflow models build-docker -m "$MODEL_DIR" -n ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest

          echo "Mengirim (Push) Image ke Docker Hub..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest
