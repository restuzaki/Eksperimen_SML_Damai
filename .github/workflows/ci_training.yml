name: CI Pipeline & Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "Workflow-CI/**"
      - ".github/workflows/ci_training.yml"

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: restuzaki
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/restuzaki/Eksperimen_SML_Damai.mlflow

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLflow Project (Training Model)
        run: |
          echo "Menjalankan pelatihan model otomatis..."
          mlflow run Workflow-CI/MLProject/ --env-manager=local --experiment-name="Phishing_Detection_CI_Pipeline"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cat << 'EOF' > build_script.py
          import mlflow
          import os
          import time
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri(os.environ.get("MLFLOW_TRACKING_URI"))
          client = MlflowClient()


          time.sleep(20)


          df = mlflow.search_runs(experiment_names=['Phishing_Detection_CI_Pipeline'], filter_string="status = 'FINISHED'")
          if 'tags.mlflow.log-model.history' in df.columns:
              df = df[df['tags.mlflow.log-model.history'].notnull()]

          target_run_id = df.sort_values('start_time', ascending=False).iloc[0].run_id
          print(f"Target Run ID: {target_run_id}")


          client.download_artifacts(run_id=target_run_id, path="", dst_path='./local_model_dir')


          print("Daftar file yang ada di local_model_dir:")
          for root, dirs, files in os.walk('./local_model_dir'):
              for file in files:
                  print(os.path.join(root, file))
          EOF

          python build_script.py


          MODEL_PATH=$(find ./local_model_dir -name "MLmodel" | head -n 1)

          if [ -z "$MODEL_PATH" ]; then
            echo "Error: File MLmodel tidak ditemukan setelah download."
            exit 1
          fi

          MODEL_DIR=$(dirname "$MODEL_PATH")
          echo "Model ditemukan di: $MODEL_DIR"

          echo "Membangun Docker Image..."
          mlflow models build-docker -m "$MODEL_DIR" -n ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest

          echo "Mengirim Image..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest
