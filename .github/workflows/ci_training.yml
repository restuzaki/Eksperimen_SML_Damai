name: CI Pipeline & Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "Workflow-CI/**"
      - ".github/workflows/ci_training.yml"

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: restuzaki
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/restuzaki/Eksperimen_SML_Damai.mlflow

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLflow Project (Training Model)
        run: |
          echo "Menjalankan pelatihan model otomatis..."
          mlflow run Workflow-CI/MLProject/ --env-manager=local --experiment-name="Phishing_Detection_CI_Pipeline"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cat << 'EOF' > build_script.py
          import mlflow
          import os
          import time

          mlflow.set_tracking_uri(os.environ.get("MLFLOW_TRACKING_URI"))
          print("Menunggu 20 detik agar DagsHub sinkron...")
          time.sleep(20)

          print("Mencari Run ID yang memiliki model...")
          df = mlflow.search_runs(experiment_names=['Phishing_Detection_CI_Pipeline'], filter_string="status = 'FINISHED'")

          # Memfilter dataframe hanya untuk Run yang memiliki metadata log model
          if 'tags.mlflow.log-model.history' in df.columns:
              df_model = df[df['tags.mlflow.log-model.history'].notnull()]
          else:
              df_model = df

          if df_model.empty:
              raise Exception("Tidak ada Run yang menyimpan model.")


          target_run_id = df_model.sort_values('start_time', ascending=False).iloc[0].run_id
          print(f"Run ID dengan model ditemukan: {target_run_id}")

          artifact_uri = f"runs:/{target_run_id}/model"
          print(f"Mendownload dari URI: {artifact_uri}")

          success = False
          for attempt in range(4):
              try:
                  mlflow.artifacts.download_artifacts(artifact_uri=artifact_uri, dst_path='./local_model_dir')
                  print("Download artefak berhasil.")
                  success = True
                  break
              except Exception as e:
                  print(f"Percobaan {attempt+1} gagal: {e}")
                  time.sleep(15)

          if not success:
              raise Exception("Gagal mendownload artefak dari DagsHub.")
          EOF

          python build_script.py

          echo "Membangun Docker Image..."
          mlflow models build-docker -m "./local_model_dir" -n ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest

          echo "Mengirim Image ke Docker Hub..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest
