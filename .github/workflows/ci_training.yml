name: CI Pipeline & Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "Workflow-CI/**"
      - ".github/workflows/ci_training.yml"

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: restuzaki
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/restuzaki/Eksperimen_SML_Damai.mlflow

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLflow Project (Training Model)
        run: |
          echo "Menjalankan pelatihan model otomatis..."
          mlflow run Workflow-CI/MLProject/ --env-manager=local --experiment-name="Phishing_Detection_CI_Pipeline"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cat << 'EOF' > build_script.py
          import mlflow
          import os
          import time
          from mlflow.tracking import MlflowClient

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI")
          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient()

          print("Mencari Run ID yang punya artefak MLmodel...")
          df = mlflow.search_runs(experiment_names=['Phishing_Detection_CI_Pipeline'], filter_string="status = 'FINISHED'")
          df_sorted = df.sort_values('start_time', ascending=False)

          target_run_id = None
          for _, row in df_sorted.iterrows():
              artifacts = client.list_artifacts(row.run_id)
              paths = [a.path for a in artifacts]
              # Cek apakah ada file MLmodel atau folder model di dalamnya
              if any("MLmodel" in p or "model" in p for p in paths):
                  target_run_id = row.run_id
                  break

          if not target_run_id:
              raise Exception("Gagal! Tidak ditemukan artefak model di DagsHub.")
              
          print(f"Menggunakan Run ID yang valid: {target_run_id}")

          print("Mendownload SEMUA artifact dari Run tersebut...")
          for attempt in range(4):
              try:
                  mlflow.artifacts.download_artifacts(artifact_uri=f"runs:/{target_run_id}", dst_path='./local_model_dir')
                  print(" Download artefak berhasil!")
                  break
              except Exception as e:
                  print(f" Menunggu sinkronisasi DagsHub... (Percobaan {attempt+1}/4)")
                  time.sleep(15)
          else:
              raise Exception("Gagal mendownload artefak.")
          EOF

          python build_script.py

          echo "Mencari lokasi pasti dari file MLmodel..."
          MODEL_DIR=$(dirname $(find ./local_model_dir -name "MLmodel" | head -n 1))
          echo "Model ditemukan di direktori: $MODEL_DIR"

          echo "Membangun Docker Image..."
          mlflow models build-docker -m "$MODEL_DIR" -n ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest

          echo "Mengirim (Push) Image ke Docker Hub..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest
