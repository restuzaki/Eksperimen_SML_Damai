name: CI Pipeline & Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "Workflow-CI/**"
      - ".github/workflows/ci_training.yml"

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: restuzaki
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/restuzaki/Eksperimen_SML_Damai.mlflow
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLflow Project (Training Model)
        run: |
          echo "Menjalankan pelatihan model otomatis..."
          mlflow run Workflow-CI/MLProject/ --env-manager=local --experiment-name="Phishing_Detection_CI_Pipeline_V2"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cat << 'EOF' > build_script.py
          import mlflow
          import os
          import time
          from mlflow.tracking import MlflowClient

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI")
          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient(tracking_uri=tracking_uri)
          
          print("Menunggu 15 detik agar DagsHub sinkron...")
          time.sleep(15)

          print("Mencari catatan log lokasi model yang paling akurat...")
          experiment = client.get_experiment_by_name('Phishing_Detection_CI_Pipeline_V2')
          if not experiment:
              raise Exception("Eksperimen 'Phishing_Detection_CI_Pipeline_V2' tidak ditemukan!")
              
          df = mlflow.search_runs(experiment_ids=[experiment.experiment_id], filter_string="status = 'FINISHED'")
          
          if df.empty:
              raise Exception("Tidak ada run dengan status 'FINISHED' ditemukan di eksperimen 'Phishing_Detection_CI_Pipeline_V2'!")
              
          recent_runs = df.sort_values('start_time', ascending=False)
          
          exact_run_id = None
          exact_path = "model"
          artifacts = []
          
          # Iterate over the 5 most recent runs to find the one that actually contains artifacts
          for _, run in recent_runs.head(5).iterrows():
              run_id = run['run_id'] if 'run_id' in run else run['run_uuid']
              try:
                  run_artifacts = client.list_artifacts(run_id)
                  print(f"Run ID: {run_id} memiliki artifacts: {[a.path for a in run_artifacts]}")
                  if len(run_artifacts) > 0:
                      exact_run_id = run_id
                      artifacts = run_artifacts
                      break
              except Exception as e:
                  print(f"Gagal mengecek artifact untuk run {run_id}: {e}")
                  
          if not exact_run_id:
              raise Exception("Tidak ada run terbaru yang memiliki artifact yang tersimpan di DagsHub! Model tidak terupload dengan benar.")
          
          print(f"\nLokasi Asli Ditemukan! Menggunakan Run ID: {exact_run_id} yang memiliki artifact.")
          print(f"Mendownload artifact path: {exact_path}")
          try:
              local_dir = client.download_artifacts(exact_run_id, exact_path, './local_model_dir')
              print(f"Proses download via Python selesai. Path: {local_dir}")
          except Exception as e:
              print(f"Gagal download dengan path {exact_path}: {e}")
              if len(artifacts) > 0:
                  fallback_path = artifacts[0].path
                  print(f"Mencoba download dari fallback path: {fallback_path}")
                  local_dir = client.download_artifacts(exact_run_id, fallback_path, './local_model_dir')
                  print(f"Proses download fallback selesai. Path: {local_dir}")
              else:
                  raise Exception("Tidak ada artifact untuk didownload!")
          EOF

          python build_script.py

          echo "Memverifikasi dan mencari letak fisik file MLmodel..."
          MODEL_DIR=$(dirname $(find ./local_model_dir -name "MLmodel" | head -n 1))
          
          if [ -z "$MODEL_DIR" ]; then
            echo "Error: MLmodel tetap tidak ditemukan di harddisk lokal!"
            exit 1
          fi
          
          echo "Direktori model siap: $MODEL_DIR"

          echo "Membangun Docker Image..."
          mlflow models build-docker -m "$MODEL_DIR" -n ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest

          echo "Mengirim Image ke Docker Hub..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest