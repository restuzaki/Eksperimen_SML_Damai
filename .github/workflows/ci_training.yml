name: CI Pipeline & Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "Workflow-CI/**"
      - ".github/workflows/ci_training.yml"

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: restuzaki
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/restuzaki/Eksperimen_SML_Damai.mlflow
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLflow Project (Training Model)
        run: |
          echo "Menjalankan pelatihan model otomatis..."
          mlflow run Workflow-CI/MLProject/ --env-manager=local --experiment-name="Phishing_Detection_CI_Pipeline_V3"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          echo "Memverifikasi dan mencari letak fisik file MLmodel..."
          MODEL_DIR=$(dirname $(find ./local_model_dir -name "MLmodel" | head -n 1))
          
          if [ -z "$MODEL_DIR" ]; then
            echo "Error: MLmodel tetap tidak ditemukan di harddisk lokal!"
            exit 1
          fi
          
          echo "Direktori model siap: $MODEL_DIR"

          echo "Membangun Docker Image..."
          mlflow models build-docker -m "$MODEL_DIR" -n ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest

          echo "Mengirim Image ke Docker Hub..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest