name: CI Pipeline & Docker Build

on:
  push:
    branches:
      - main

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_USERNAME: restuzaki
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/restuzaki/Eksperimen_SML_Damai.mlflow

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Train Model
        run: |

          cd Workflow-CI/MLProject
          python modelling.py

      - name: Build and Push Docker Image
        run: |
          cat << 'EOF' > build_script.py
          import mlflow
          import os
          from mlflow.tracking import MlflowClient
          import shutil

          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          client = MlflowClient()


          df = mlflow.search_runs(experiment_names=['Phishing_Detection_CI_Pipeline'], filter_string="status = 'FINISHED'")
          run_id = df.sort_values('start_time', ascending=False).iloc[0].run_id
          print(f"Target Run ID: {run_id}")

          client.download_artifacts(run_id=run_id, path="", dst_path='./downloaded_artifacts')

          print("Daftar semua file yang terunduh:")
          for root, dirs, files in os.walk('./downloaded_artifacts'):
              for file in files:
                  print(os.path.join(root, file))
          EOF

          python build_script.py


          MLMODEL_PATH=$(find ./downloaded_artifacts -name "MLmodel" | head -n 1)

          if [ -z "$MLMODEL_PATH" ]; then
            echo "Error: File MLmodel tidak ditemukan di manapun!"
            exit 1
          fi


          MODEL_DIR=$(dirname "$MLMODEL_PATH")
          echo "Model ditemukan di: $MODEL_DIR"


          mlflow models build-docker -m "$MODEL_DIR" -n ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest
