name: CI Pipeline & Docker Build

on:
  push:
    branches:
      - main
    paths:
      - "Workflow-CI/**"
      - ".github/workflows/ci_training.yml"

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_USERNAME: restuzaki
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/restuzaki/Eksperimen_SML_Damai.mlflow

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLflow Project (Training Model)
        run: |
          echo "Menjalankan pelatihan model otomatis..."
          mlflow run Workflow-CI/MLProject/ --env-manager=local --experiment-name="Phishing_Detection_CI_Pipeline"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cat << 'EOF' > build_script.py
          import mlflow
          import os
          import time
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          client = MlflowClient()

          print(" Menunggu 20 detik agar DagsHub memproses file...")
          time.sleep(20)

          # Ambil 3 Run ID terbaru
          df = mlflow.search_runs(experiment_names=['Phishing_Detection_CI_Pipeline'], filter_string="status = 'FINISHED'")
          run_ids = df.sort_values('start_time', ascending=False).head(3).run_id.tolist()

          success = False
          for attempt in range(5):
              print(f"\n--- Percobaan {attempt+1}/5 ---")
              for run_id in run_ids:
                  print(f" Mencoba download paksa dari Run ID: {run_id}")
                  try:
                     
                      client.download_artifacts(run_id=run_id, path="", dst_path='./local_model_dir')
                      
                     
                      mlmodel_exists = False
                      for root, dirs, files in os.walk('./local_model_dir'):
                          if 'MLmodel' in files:
                              mlmodel_exists = True
                              break
                              
                      if mlmodel_exists:
                          print(f" File MLmodel berhasil didownload secara fisik!")
                          success = True
                          break
                      else:
                          print("Artefak terdownload, tapi isinya zonk (belum ada MLmodel).")
                  except Exception as e:
                      print(f" Error saat download: {e}")
              
              if success:
                  break
              
              print("Server DagsHub masih delay. Menunggu 15 detik lagi...")
              time.sleep(15)

          if not success:
              raise Exception(" Gagal total mendapatkan model dari DagsHub.")
          EOF

          python build_script.py

          echo "Mencari lokasi pasti dari file MLmodel..."
          MODEL_DIR=$(dirname $(find ./local_model_dir -name "MLmodel" | head -n 1))
          echo "Model ditemukan di direktori: $MODEL_DIR"

          echo "Membangun Docker Image..."
          mlflow models build-docker -m "$MODEL_DIR" -n ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest

          echo "Mengirim (Push) Image ke Docker Hub..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/phishing-model:latest
