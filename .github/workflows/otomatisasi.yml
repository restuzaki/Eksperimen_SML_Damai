name: Automasi Preprocessing Data

on:
  push:
    branches:
      - main
    paths:
      - "namadataset_raw/**"
      - "preprocessing/automate_*.py"
      - ".github/workflows/otomatisasi.yml"

jobs:
  build-and-preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run Preprocessing Script
        run: |
          python preprocessing/automate_Damai.py

      - name: Commit and Push Clean Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add namadataset_preprocessing/dataset_clean.csv
          git commit -m "Auto-update: Hasil preprocessing data terbaru" || echo "No changes to commit"
          git push
